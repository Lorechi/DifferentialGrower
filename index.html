<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Differential Growth Camera</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage">
      <video id="camera" playsinline muted></video>
      <canvas id="canvas"></canvas>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-controls="controls" aria-expanded="false">controls</button>
      <aside id="controls" class="controls" aria-label="Controls">
        <div class="control-actions">
          <button id="reseed" type="button">Reseed</button>
          <button id="overlay" type="button" aria-pressed="false">Camera background</button>
          <button id="fullscreen" type="button">Fullscreen</button>
        </div>

        <div class="sliders" aria-label="Parameters">
          <section class="slider-group" aria-labelledby="growth-heading">
            <h2 id="growth-heading">Differential growth</h2>
            <label>
              <span>repelStrength <output for="repel-strength">1.00</output></span>
              <input id="repel-strength" type="range" min="0.05" max="1.5" step="0.05" value="1.00" data-param="repelStrength">
            </label>
            <label>
              <span>repelRadius <output for="repel-radius">40</output></span>
              <input id="repel-radius" type="range" min="10" max="90" step="1" value="40" data-param="repelRadius">
            </label>
            <label>
              <span>maxEdge <output for="max-edge">24</output></span>
              <input id="max-edge" type="range" min="10" max="70" step="1" value="24" data-param="maxEdge">
            </label>
            <label>
              <span>maxNewPoints <output for="max-new-points">60</output></span>
              <input id="max-new-points" type="range" min="1" max="120" step="1" value="60" data-param="maxNewPoints">
            </label>
            <label>
              <span>relaxStrength <output for="relax-strength">0.35</output></span>
              <input id="relax-strength" type="range" min="0.05" max="1.2" step="0.05" value="0.35" data-param="relaxStrength">
            </label>
            <label>
              <span>timeStep <output for="time-step">0.50</output></span>
              <input id="time-step" type="range" min="0.1" max="1.5" step="0.05" value="0.5" data-param="timeStep">
            </label>
            <label>
              <span>iterations <output for="iterations">1</output></span>
              <input id="iterations" type="range" min="1" max="4" step="1" value="1" data-param="iterations">
            </label>
            <label>
              <span>smoothStrength <output for="smooth-strength">0.30</output></span>
              <input id="smooth-strength" type="range" min="0" max="0.8" step="0.05" value="0.3" data-param="smoothStrength">
            </label>
            <label>
              <span>outlineThickness <output for="outline-thickness">2</output></span>
              <input id="outline-thickness" type="range" min="1" max="10" step="1" value="2" data-param="outlineThickness">
            </label>
          </section>
          <section class="slider-group" aria-labelledby="recognition-heading">
            <h2 id="recognition-heading">Recognition and outline</h2>
            <label>
              <span>segmentationThreshold <output for="segmentation-threshold">0.40</output></span>
              <input id="segmentation-threshold" type="range" min="0.05" max="0.9" step="0.05" value="0.4" data-param="segmentationThreshold">
            </label>
            <label>
              <span>minContourArea <output for="min-contour-area">2500</output></span>
              <input id="min-contour-area" type="range" min="500" max="20000" step="500" value="2500" data-param="minContourArea">
            </label>
            <label>
              <span>maskCleanupPasses <output for="mask-cleanup-passes">1</output></span>
              <input id="mask-cleanup-passes" type="range" min="0" max="3" step="1" value="1" data-param="maskCleanupPasses">
            </label>
            <label>
              <span>initialOutlineSmoothPasses <output for="initial-outline-smooth-passes">2</output></span>
              <input id="initial-outline-smooth-passes" type="range" min="0" max="6" step="1" value="2" data-param="initialOutlineSmoothPasses">
            </label>
            <label>
              <span>initialOutlineSmoothStrength <output for="initial-outline-smooth-strength">0.35</output></span>
              <input id="initial-outline-smooth-strength" type="range" min="0" max="0.8" step="0.05" value="0.35" data-param="initialOutlineSmoothStrength">
            </label>
          </section>
        </div>
      </aside>
      <div id="status" class="status" role="status">Starting camera. Please allow camera access when prompted.</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script src="app.js"></script>
  </body>
</html>
